<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="A generative universe clock - time rendered as orbiting planets, unique every day.">
  <meta name="theme-color" content="#000008">
  <title>Universe Clock</title>

  <!-- PWA manifest inline -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <!-- Google Fonts: Orbitron (display) + Space Mono (mono readout) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/ui.css">
</head>
<body>
  <canvas id="universe"></canvas>

  <!-- HUD: top-left time readout -->
  <div id="hud">
    <div id="hud-time">00:00:00</div>
    <div id="hud-date">Loading...</div>
    <div id="hud-seed">SEED <span id="hud-seed-val">-</span></div>
  </div>

  <!-- Credit -->
  <div id="credit">
    <span>Agus Satria Adhitama</span>
  </div>

  <!-- Control panel toggle button -->
  <button id="panel-toggle" aria-label="Settings" aria-expanded="false">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4"/>
      <path d="M9 1.5V3M9 15v1.5M1.5 9H3M15 9h1.5M3.697 3.697l1.06 1.06M13.243 13.243l1.06 1.06M3.697 14.303l1.06-1.06M13.243 4.757l1.06-1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Settings panel -->
  <aside id="panel" aria-hidden="true">
    <div class="panel-section">
      <label class="panel-label">Date seed</label>
      <input type="date" id="date-input" class="panel-date">
      <button id="date-today" class="panel-btn-sm">Today</button>
    </div>

    <div class="panel-section">
      <label class="panel-label">Visual mode</label>
      <div class="mode-buttons">
        <button class="mode-btn active" data-mode="cosmic">Cosmic</button>
        <button class="mode-btn" data-mode="minimal">Minimal</button>
        <button class="mode-btn" data-mode="orrery">Orrery</button>
      </div>
    </div>

    <div class="panel-section">
      <label class="panel-label">Show trails</label>
      <label class="toggle-wrap">
        <input type="checkbox" id="trails-toggle" checked>
        <span class="toggle"></span>
      </label>
    </div>

    <div class="panel-section">
      <label class="panel-label">Show nebula</label>
      <label class="toggle-wrap">
        <input type="checkbox" id="nebula-toggle" checked>
        <span class="toggle"></span>
      </label>
    </div>

    <div class="panel-section">
      <label class="panel-label">Show HUD</label>
      <label class="toggle-wrap">
        <input type="checkbox" id="hud-toggle" checked>
        <span class="toggle"></span>
      </label>
    </div>

    <div class="panel-section panel-actions">
      <button id="btn-fullscreen" class="panel-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 5V1h4M9 1h4v4M13 9v4H9M5 13H1V9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Fullscreen
      </button>
      <button id="btn-screenshot" class="panel-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="3" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/><circle cx="7" cy="7.5" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M4.5 3L5.5 1h3l1 2" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        Screenshot
      </button>
      <button id="btn-share" class="panel-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="11" cy="2.5" r="1.5" stroke="currentColor" stroke-width="1.3"/><circle cx="11" cy="11.5" r="1.5" stroke="currentColor" stroke-width="1.3"/><circle cx="3" cy="7" r="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4.4 6.2l5.2-3M4.4 7.8l5.2 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Share link
      </button>
    </div>

    <div id="share-toast" class="toast" aria-live="polite"></div>
  </aside>

  <!-- Overlay dim when panel open on mobile -->
  <div id="panel-overlay"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
